<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Balance Bot Terminal</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #0e1116; color: #e6edf3; margin: 0; padding: 16px; }
    h1 { font-size: 18px; }
    .k { color: #8b96a5; }
    .v { font-variant-numeric: tabular-nums; }
    #term {
      margin-top: 12px; height: 55vh; overflow: auto;
      background: #171c24; border: 1px solid #222a35; border-radius: 8px;
      padding: 8px; font-family: monospace; font-size: 13px; white-space: pre-wrap;
    }
    .cmd { color: #6ea8fe; }
    .resp { color: #22c55e; }
    .sys { color: #8b96a5; }
    .warn { color: #f59e0b; }
    #conn { display: flex; gap: 8px; align-items: center; margin: 8px 0; flex-wrap: wrap; }
    #bar { display: flex; gap: 8px; margin-top: 8px; }
    #in, #ip { background: #0f141b; border: 1px solid #2a3340; color: #e6edf3;
          border-radius: 8px; padding: 8px; font-family: monospace; }
    #in { flex: 1; }
    button { background: #3b82f6; color: #fff; border: 0; border-radius: 8px; padding: 8px 14px; cursor: pointer; }
    .dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; background: #ef4444; margin-right: 6px; }
    .dot.on { background: #22c55e; }
    #ota { margin-top: 12px; padding-top: 10px; border-top: 1px solid #222a35; font-size: 13px; }
    #ota input[type=file] { color: #8b96a5; }
    #otastat { margin-left: 8px; }
    #bar2 { height: 6px; background: #171c24; border-radius: 4px; margin-top: 6px; overflow: hidden; display: none; }
    #bar2 > div { height: 100%; width: 0; background: #3b82f6; transition: width .1s; }
    #motors { display: flex; align-items: center; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
    #motors select, #motors input[type=range] { background: #0f141b; border: 1px solid #2a3340; color: #e6edf3; border-radius: 6px; }
    #mval { flex: 1; min-width: 140px; }
    .stopbtn { background: #ef4444; }
  </style>
</head>
<body>
  <h1><span id="dot" class="dot"></span>Balance Bot - terminal</h1>

  <div id="conn">
    <span class="k">ESP32 IP:</span>
    <input id="ip" size="16" placeholder="192.168.4.1" />
    <button id="connbtn" onclick="reconnect()">Connect</button>
  </div>

  <div style="margin-top:6px">
    <span class="k">accel (g):</span> <span class="v" id="acc">--</span> &nbsp;
    <span class="k">gyro (dps):</span> <span class="v" id="gyr">--</span> &nbsp;
    <span class="k">temp:</span> <span class="v" id="temp">--</span> &deg;C
  </div>
  <div style="margin-top:6px">
    <span class="k">motor L:</span> <span class="v" id="mL">--</span> &nbsp;
    <span class="k">motor R:</span> <span class="v" id="mR">--</span>
  </div>
  <div style="margin-top:6px">
    <span class="k">vel (rad/s):</span> <span class="v" id="vel">--</span> &nbsp;
    <button onclick="send('enc reset')">reset enc</button>
  </div>

  <div id="motors">
    <span class="k">motor test:</span>
    <select id="msel">
      <option value="both">both</option>
      <option value="l">left</option>
      <option value="r">right</option>
    </select>
    <input type="range" id="mval" min="-100" max="100" value="0" />
    <span id="mvallbl" class="v">0%</span>
    <button onclick="applyMotor()">Apply</button>
    <button class="stopbtn" onclick="send('stop')">STOP</button>
    <button onclick="send('deadband')">Find deadband</button>
    <button class="stopbtn" onclick="send('deadband stop')">Stop DB</button>
  </div>

  <div id="ctrl" style="margin-top:8px;">
    <span class="k">control task:</span>
    <button onclick="send('control start')">START_CONTROL</button>
    <button class="stopbtn" onclick="send('control stop')">STOP_CONTROL</button>
    <span class="v">(stop before flashing)</span>
  </div>

  <div id="exp" style="margin-top:8px;">
    <span class="k">experiment:</span>
    <button onclick="send('exp motors')">TEST_MOTORS</button>
    <button onclick="send('exp motor-ctrl')">TEST_MOTOR_CONTROLLERS</button>
    <button onclick="send('exp angles')">TEST_ANGLES_ESTIMATION</button>
  </div>

  <div id="seq" style="margin-top:8px;">
    <span class="k">motor script:</span>
    <input type="file" id="seqfile" accept=".csv,.txt" />
    <button onclick="uploadSeq()">Load &amp; play</button>
    <button class="stopbtn" onclick="send('play stop')">Stop</button>
    <span id="seqstat" class="sys"></span>
    <span class="v">(TEST_MOTORS; steps "dur,mL,mR" - dur sec, mL/mR -1..1, max 20)</span>
  </div>

  <div id="rec" style="margin-top:8px; display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
    <span class="k">data log:</span>
    <select id="rectopic">
      <option value="imu">imu</option>
      <option value="angles">angles</option>
      <option value="motors">motors</option>
    </select>
    <button id="recbtn" onclick="toggleRecord()">Record to file</button>
    <span id="recstat" class="sys">idle</span>
  </div>

  <div id="term"></div>
  <div id="bar">
    <input id="in" placeholder="type a command (try: help) and press Enter" autocomplete="off" />
    <button onclick="sendCmd()">Send</button>
  </div>

  <div id="ota">
    <span class="k">firmware (OTA):</span>
    <input type="file" id="fw" accept=".bin" />
    <button onclick="upload()">Flash</button>
    <span id="otastat" class="sys"></span>
    <div id="bar2"><div id="bar2fill"></div></div>
  </div>

  <script>
    const term = document.getElementById('term');
    const dot = document.getElementById('dot');
    const input = document.getElementById('in');

    /* This page is hosted on the PC, so it is not served by the ESP32. The
     * device address is entered in the IP box and remembered between sessions;
     * the WebSocket and OTA URLs are built from it. */
    let ws = null, retry = null;
    let esp = localStorage.getItem('espIp') || '192.168.4.1';
    const wsUrl  = () => `ws://${esp}/ws`;
    const otaUrl = () => `http://${esp}/ota`;
    const seqUrl = () => `http://${esp}/motorseq`;

    function add(text, cls) {
      const now = new Date();
      const ts = now.toTimeString().slice(0, 8) +
                 '.' + String(now.getMilliseconds()).padStart(3, '0');
      const span = document.createElement('span');
      if (cls) span.className = cls;
      span.textContent = `[${ts}] ${text}\n`;
      term.appendChild(span);
      term.scrollTop = term.scrollHeight;
      while (term.childElementCount > 500) term.removeChild(term.firstChild);
    }

    const f2 = (x) => (x >= 0 ? '+' : '') + x.toFixed(2);
    const f1 = (x) => (x >= 0 ? '+' : '') + x.toFixed(1);

    /* Each field updates independently so a per-topic frame (which carries only
     * some of them) refreshes just its own part of the dashboard. */
    function setValues(d) {
      if (d.imu_ok !== undefined) {
        if (d.imu_ok) {
          acc.textContent = `${f2(d.ax)} ${f2(d.ay)} ${f2(d.az)}`;
          gyr.textContent = `${f1(d.gx)} ${f1(d.gy)} ${f1(d.gz)}`;
          temp.textContent = d.temp.toFixed(1);
        } else {
          acc.textContent = gyr.textContent = temp.textContent = 'no IMU';
        }
      }
      if (d.mL !== undefined) {
        mL.textContent = (d.mL * 100).toFixed(0) + '%';
        mR.textContent = (d.mR * 100).toFixed(0) + '%';
      }
      if (d.velL !== undefined) {
        vel.textContent = `${f2(d.velL)} ${f2(d.velR)}`;
      }
    }

    /* Telemetry batches arrive as packed binary WebSocket frames:
     *   [u8 topic_id][u8 field_count][u16 sample_count]   (little-endian)
     *   then, per sample: uint64 t_us, followed by (field_count-1) float32 values
     * The column order and the topic_id -> name mapping below MUST match the
     * per-topic packers in telemetry.c (telemetry_topic_pack). Column 0 (t) is
     * always microseconds since boot; other fields are float32 (NaN => empty cell). */
    const TOPIC_BY_ID = ['imu', 'angles', 'motors'];
    const TOPICS = {
      imu:    ['t', 'ax', 'ay', 'az', 'gx', 'gy', 'gz', 'temp', 'ok'],
      angles: ['t', 'roll', 'pitch', 'roll_sp', 'pitch_sp'],
      motors: ['t', 'velL', 'velR', 'velL_sp', 'velR_sp', 'mL', 'mR'],
    };
    /* Turn one batch row into a flat object keyed by the topic's columns. */
    function rowToObj(cols, row) {
      const o = {};
      for (let i = 0; i < cols.length; i++) o[cols[i]] = row[i];
      return o;
    }

    /* Decode one packed binary batch into { topic, cols, rows } where each row is
     * a numeric array in the topic's column order (t in us, NaN for empty). */
    function decodeBatch(buf) {
      const dv = new DataView(buf);
      const topic = TOPIC_BY_ID[dv.getUint8(0)];
      const nf = dv.getUint8(1);
      const ns = dv.getUint16(2, true);
      if (!topic) return null;
      const cols = TOPICS[topic];
      const rows = [];
      let off = 4;
      for (let i = 0; i < ns; i++) {
        const r = new Array(nf);
        r[0] = Number(dv.getBigUint64(off, true)); off += 8;   /* t in us */
        for (let j = 1; j < nf; j++) { r[j] = dv.getFloat32(off, true); off += 4; }
        rows.push(r);
      }
      return { topic, cols, rows };
    }

    function connect() {
      clearTimeout(retry);
      try { ws = new WebSocket(wsUrl()); }
      catch (e) { add('bad address: ' + esp, 'sys'); return; }
      ws.binaryType = 'arraybuffer';   /* telemetry batches arrive as binary */
      ws.onopen = () => { dot.classList.add('on'); add('connected to ' + esp, 'sys'); };
      ws.onclose = () => { dot.classList.remove('on'); add('disconnected - retrying...', 'sys'); retry = setTimeout(connect, 1500); };
      ws.onmessage = (ev) => {
        if (ev.data instanceof ArrayBuffer) { onBinary(ev.data); return; }
        let d; try { d = JSON.parse(ev.data); } catch (e) { add(ev.data); return; }
        if (d.type === 'telemetry') {
          setValues(d);
        } else if (d.type === 'resp_stats') {
          setValues(d);
          const imu = d.imu_ok
            ? ` imu a=[${f2(d.ax)} ${f2(d.ay)} ${f2(d.az)}]g g=[${f1(d.gx)} ${f1(d.gy)} ${f1(d.gz)}]dps ${d.temp.toFixed(1)}C`
            : ' imu:off';
          const on = (x) => (x ? 'ON' : 'OFF');
          let mode = d.cmode !== undefined
            ? ` mode=${d.cmode} est=${on(d.est)} mctrl=${on(d.mctrl)}` : '';
          if (d.play_len) mode += ` play=${d.play_pos}/${d.play_len}${d.play ? '(running)' : ''}`;
          add(`stats: rate=${d.rate}Hz mot=[${(d.mL * 100).toFixed(0)} ${(d.mR * 100).toFixed(0)}]% ` +
              `enc=[${d.posL.toFixed(3)} ${d.posR.toFixed(3)}]rad vel=[${f2(d.velL)} ${f2(d.velR)}]rad/s${imu}${mode}`, 'resp');
        } else if (d.type === 'warn') {
          add('WARN: ' + d.text, 'warn');
        } else if (d.type === 'resp') {
          add(d.text, 'resp');
        }
      };
    }

    /* Point at a new device address (from the IP box) and reconnect. */
    function reconnect() {
      const v = document.getElementById('ip').value.trim();
      if (v) { esp = v; localStorage.setItem('espIp', esp); }
      clearTimeout(retry);
      if (ws) { ws.onclose = null; try { ws.close(); } catch (e) {} ws = null; }
      add('connecting to ' + esp + '...', 'sys');
      connect();
    }

    /* A telemetry batch carries a topic + rows[] in that topic's column order.
     * Refresh the matching part of the dashboard from the last row, and (if we
     * are recording this topic) append its rows to the CSV. */
    function onBinary(buf) {
      const b = decodeBatch(buf);
      if (!b || !b.rows.length) return;
      const { topic, cols, rows } = b;
      const last = rowToObj(cols, rows[rows.length - 1]);
      if (topic === 'imu') {
        setValues({ imu_ok: !!last.ok, ax: last.ax, ay: last.ay, az: last.az,
                    gx: last.gx, gy: last.gy, gz: last.gz, temp: last.temp });
      } else if (topic === 'motors') {
        setValues({ mL: last.mL, mR: last.mR, velL: last.velL, velR: last.velR });
      }
      /* 'angles' has no live readout yet (values are NaN until estimation). */
      if (recording && topic === recTopic) writeBatch(topic, cols, rows);
    }

    /* ---- recording the telemetry stream to a CSV file ----
     * Prefer the File System Access API (streams straight to disk); fall back to
     * accumulating in memory and downloading when recording stops. */
    let recording = false, fileWriter = null, csvHeader = null, memRows = [], recName = '', recTopic = '';
    const recstat = (t) => { document.getElementById('recstat').textContent = t; };

    /* Build a "topic_YYYYMMDD_HHMMSS.csv" name from the current local time. */
    function recordFilename(topic) {
      const d = new Date();
      const p = (n) => String(n).padStart(2, '0');
      const date = `${d.getFullYear()}${p(d.getMonth() + 1)}${p(d.getDate())}`;
      const time = `${p(d.getHours())}${p(d.getMinutes())}${p(d.getSeconds())}`;
      return `${topic}_${date}_${time}.csv`;
    }

    /* Format one decoded cell for the CSV: t (col 0) is us -> seconds, NaN is an
     * empty cell, everything else is written to 6 decimal places. */
    function fmtCell(topic, j, v) {
      if (j === 0) return (v / 1e6).toFixed(6);   /* t: us -> s */
      if (Number.isNaN(v)) return '';
      return v.toFixed(6);
    }

    function batchToCsv(topic, cols, rows) {
      let out = '';
      if (csvHeader === null) { csvHeader = cols.join(','); out += csvHeader + '\n'; }
      for (const r of rows) out += r.map((v, j) => fmtCell(topic, j, v)).join(',') + '\n';
      return out;
    }

    async function writeBatch(topic, cols, rows) {
      const text = batchToCsv(topic, cols, rows);
      if (fileWriter) {
        try { await fileWriter.write(text); } catch (e) { recstat('write error: ' + e.message); }
      } else {
        memRows.push(text);
      }
    }

    async function toggleRecord() {
      if (recording) { await stopRecord(); return; }
      csvHeader = null; memRows = []; fileWriter = null;
      recTopic = document.getElementById('rectopic').value;
      recName = recordFilename(recTopic);
      if (window.showSaveFilePicker) {
        try {
          const handle = await showSaveFilePicker({
            suggestedName: recName,
            types: [{ description: 'CSV', accept: { 'text/csv': ['.csv'] } }],
          });
          fileWriter = await handle.createWritable();
        } catch (e) { recstat('cancelled'); return; }
      }
      recording = true;
      document.getElementById('rectopic').disabled = true;
      document.getElementById('recbtn').textContent = 'Stop recording';
      recstat(fileWriter ? `recording '${recTopic}' to file...` : `recording '${recTopic}' (in-memory)...`);
    }

    async function stopRecord() {
      recording = false;
      document.getElementById('rectopic').disabled = false;
      document.getElementById('recbtn').textContent = 'Record to file';
      if (fileWriter) {
        try { await fileWriter.close(); } catch (e) {}
        fileWriter = null;
        recstat('saved');
        return;
      }
      const blob = new Blob(memRows, { type: 'text/csv' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = recName || recordFilename(recTopic || 'telemetry');
      a.click();
      URL.revokeObjectURL(a.href);
      memRows = [];
      recstat('downloaded');
    }

    function send(cmd) {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      add('> ' + cmd, 'cmd');
      ws.send(cmd);
    }

    function sendCmd() {
      const cmd = input.value.trim();
      if (!cmd) return;
      send(cmd);
      input.value = '';
    }

    const mval = document.getElementById('mval');
    mval.addEventListener('input', () => { document.getElementById('mvallbl').textContent = mval.value + '%'; });
    function applyMotor() { send(`motor ${document.getElementById('msel').value} ${mval.value}`); }

    function upload() {
      const f = document.getElementById('fw').files[0];
      const stat = document.getElementById('otastat');
      const bar = document.getElementById('bar2');
      const fill = document.getElementById('bar2fill');
      if (!f) { stat.textContent = 'pick a .bin file first'; return; }

      const xhr = new XMLHttpRequest();
      xhr.open('POST', otaUrl());
      bar.style.display = 'block';
      add(`uploading firmware to ${esp}: ${f.name} (${(f.size / 1024).toFixed(0)} KB)...`, 'sys');

      xhr.upload.onprogress = (e) => {
        if (!e.lengthComputable) return;
        const pct = (e.loaded / e.total * 100);
        fill.style.width = pct + '%';
        stat.textContent = `uploading ${pct.toFixed(0)}%`;
      };
      xhr.onload = () => {
        if (xhr.status === 200) {
          stat.textContent = 'flashed - device rebooting';
          add('OTA OK - device is rebooting into the new image. Reconnect in a few seconds.', 'resp');
        } else {
          stat.textContent = 'failed: ' + (xhr.responseText || xhr.status);
          add('OTA failed: ' + (xhr.responseText || xhr.status), 'resp');
        }
      };
      xhr.onerror = () => { stat.textContent = 'upload error (connection lost)'; };
      xhr.send(f);
    }

    /* Send a per-tick motor script (CSV/txt) to the ESP32; it plays back one row
     * per control tick in TEST_MOTORS. Body is text/plain so the browser skips
     * the CORS preflight for this simple request. */
    function uploadSeq() {
      const f = document.getElementById('seqfile').files[0];
      const stat = document.getElementById('seqstat');
      if (!f) { stat.textContent = 'pick a .csv/.txt file first'; return; }
      stat.textContent = 'uploading...';
      f.text().then((body) => {
        const xhr = new XMLHttpRequest();
        xhr.open('POST', seqUrl());
        xhr.setRequestHeader('Content-Type', 'text/plain');
        xhr.onload = () => {
          stat.textContent = xhr.responseText || xhr.status;
          add((xhr.status === 200 ? 'motor script: ' : 'motor script failed: ') +
              (xhr.responseText || xhr.status), 'resp');
        };
        xhr.onerror = () => { stat.textContent = 'upload error (connection lost)'; };
        xhr.send(body);
      });
    }

    input.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendCmd(); });
    const ipBox = document.getElementById('ip');
    ipBox.value = esp;
    ipBox.addEventListener('keydown', (e) => { if (e.key === 'Enter') reconnect(); });
    connect();
  </script>
</body>
</html>
